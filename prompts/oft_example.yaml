problem: |
  TITLE: OpenFusionToolkit Tester

  You have access to OpenFUSIONToolkit, a suite of modeling tools for problems in plasma and fusion research,
  in ./OpenFusionToolkit/. 

  You also have access to an agentic software toolkit, already cloned from git,
  in ./ursa/.  URSA is written using LangChain and LangGraph.

  TASKS:
    1. Your task is to use the TokaMaker tool in OpenFUSIONToolkit to build a fixed boundary equilibria example 
    2. See examples for TokaMaker at ./OpenFUSIONToolkit/src/examples/TokaMaker, use fixed_boundary/fixed_boundary_ex1.ipynb
    3. The output should be a python script that can be run to generate the fixed boundary equilibria, no need to add lots of folders or files, keep to whats needed. 
    4. If you need to generate any data or download it from the web to carry out
       this example, you may do so under the constraints listed below.
    5. All generated code should be runnable afterwards by a human, Be verbose, not silent!
       Add meaningful print statements along all steps to inform a later
       human how a run is progressing.
    6. You must RUN this new example and debug any errors, fixing them until
       the example runs to completion.
    7. Write a small README.md that explains what this example does.

  CONSTRAINTS:
    * Do NOT write into the ./ursa/ or ./OpenFusionToolkit/. directory, treat it as read-only.
    * Do not use the 'git' command for ANYTHING.
    * Do not create or modify the python environment - there should be no need
      to install any packages, remove environments, etc, everything from requirements.txt is installed. 
    * You are already running within a python environment that has URSA, so you
      do not need to install the one in ./ursa/
    * You already have the OpenFusionToolkit binary installed and the python path has already been added, no need to validate, the python imports for OpenFusionToolkit work. 
    * You can access Applications/OpenFUSIONToolkit/bin from PATH too 
    * Your shell environment has the user's OPENAI_API_KEY.
    * Do not prompt the user for anything (e.g. input()) nor display ANYTHING
      on the screen.  This task is autonomous.
    * You may search the web if necessary to carry out this task, though it
      is expected that it is not needed.

workspace: oft_generation_example
model: openai:gpt-5.2

symlinks:
  - source: ./ursa
    dest: ursa
  - source: ./OpenFUSIONToolkit
    dest: OpenFUSIONToolkit