# OpenFUSIONToolkit / TokaMaker equilibrium case (config-driven)

oft_case:
  name: demo_gs_vacuum

  model:
    type: gs_vacuum

  outputs:
    output_dir: outputs
    overwrite: true
    write_eqdsk: false
    eqdsk_filename: vacuum.geqdsk
    eqdsk_nr: 65
    eqdsk_nz: 65
    run_info: "OFT config-driven vacuum demo"
    # For vacuum runs, provide explicit grid bounds for gEQDSK output.
    eqdsk_rbounds: [0.7, 1.7]
    eqdsk_zbounds: [-0.7, 0.7]

  mesh:
    boundary:
      type: polygon
      points:
        - [0.7, -0.7]
        - [1.7, -0.7]
        - [1.7,  0.7]
        - [0.7,  0.7]

    regions:
      - id: 2
        name: vacuum
        type: vacuum
        shape:
          type: rectangle
          r0: 1.2
          z0: 0.0
          width: 1.0
          height: 1.4

    meshing:
      dx: 0.05
      require_boundary: true

  discretization:
    fe_order: 2
    full_domain: true

  physics:
    units:
      length: m
      current: A
      pressure: Pa

    # External toroidal field term (example value; not used in pure vacuum solve).
    F0: 2.2

    # Vacuum boundary condition for vac_solve.
    vacuum_bc:
      # Constant boundary psi value.
      psi: 0.0

    vacuum:
      coil_currents: []
