# Downstream agent prompt: create and run new discretizations for the OFT/TokaMaker example
#
# This YAML is intentionally self-contained: it tells an agent what files to read,
# what to change, how to run, and what constitutes success.
#
# Primary goal: create NEW configs that vary discretization (mesh + FE order) while
# preserving the baseline physics (vacuum GS) so results are comparable.
# Secondary (optional) goal: demonstrate controlled variations that also change
# equation/physics, if desired, but those should be clearly labeled as *not comparable*
# to the baseline discretization sweep.

task:
  name: "Discretization sweep for config-driven OFT/TokaMaker equilibrium example"
  objective: |
    Generate one or more new equilibrium configuration files that vary discretization
    (mesh resolution, FE order, domain extent) and run the provided runner script
    against each configuration. Collect and compare summary.json across runs.

workspace:
  root: "."
  read_only_dirs:
    - "./OpenFUSIONToolkit"
    - "./ursa"

baseline:
  runner: "run_equilibrium.py"
  baseline_config: "discretization_config.yaml"
  validator: "validate_config.py"
  baseline_case_name: "demo_gs_vacuum"

what_to_read_first:
  - "README.md"
  - "discretization_config.yaml"
  - "equilibrium_config_schema.md"   # schema documentation
  - "CONFIG_TO_OFT_MAPPING.md"        # mapping notes

rules:
  - "Do not modify ./OpenFUSIONToolkit or ./ursa."
  - "Do not hardcode physics/discretization inside run_equilibrium.py; only edit configs."
  - "For the discretization sweep, keep physics identical to the baseline vacuum case (same equation/model + vacuum_bc)."
  - "Every config you create must validate with validate_config.py."
  - "Every run must produce manifest.json and summary.json (success or controlled failure)."

naming_conventions:
  config_dir: "configs"
  config_filename_pattern: "disc_<knob>_<value>.yaml"   # e.g. disc_dx_0p03.yaml
  case_name_pattern: "demo_gs_vacuum__<tag>"            # set oft_case.name accordingly
  output_dir: "outputs"

# Template/sweep plan. You may adjust values if validation fails, but keep the
# sweep concept: vary discretization only.
#
# Notes on knobs (from config):
#   - oft_case.discretization.fe_order: polynomial order (typical: 1-3)
#   - oft_case.geometry.boundary.*: boundary polygon; keep fixed for comparable runs
#   - oft_case.mesh.dx: mesh target spacing (smaller => finer)
#   - oft_case.discretization.full_domain: include/exclude external vacuum region (if supported)
#
# Recommended baseline to preserve in all sweep configs:
#   - oft_case.model.type: gs_vacuum
#   - oft_case.physics.vacuum_bc.psi: 0.0
#   - same boundary polygon
sweep:
  required_configs:
    - name: "coarse_mesh"
      changes:
        oft_case:
          name: "demo_gs_vacuum__dx0p08"
          mesh:
            dx: 0.08
    - name: "baseline_mesh_copy"
      changes:
        oft_case:
          name: "demo_gs_vacuum__dx0p05"
          mesh:
            dx: 0.05
    - name: "fine_mesh"
      changes:
        oft_case:
          name: "demo_gs_vacuum__dx0p03"
          mesh:
            dx: 0.03
    - name: "higher_order"
      changes:
        oft_case:
          name: "demo_gs_vacuum__p2"
          discretization:
            fe_order: 2

  optional_configs:
    - name: "p3_fine"
      changes:
        oft_case:
          name: "demo_gs_vacuum__p3_dx0p03"
          discretization:
            fe_order: 3
          mesh:
            dx: 0.03

execution:
  validate_cmd_template: "python validate_config.py --config {config} --effective {effective_out}"
  run_cmd_template: "python run_equilibrium.py --config {config} --output-dir outputs --force"

acceptance_criteria:
  per_config:
    - "Config file exists under ./configs/"
    - "Validation succeeds (exit code 0)"
    - "Runner produces a run directory under outputs/<case_name>/<run_id>/"
    - "The run directory contains: effective_config.yaml, run.log, summary.json, manifest.json"
  sweep_level:
    - "At least 3 discretization variants are run successfully (status=success in summary.json)."
    - "A short comparison table is produced using summary.json fields (mesh size, fe_order, any solver iterations / residuals if present)."

comparison_guidance:
  how_to_compare: |
    For each run directory, open summary.json. Compare:
      - summary["status"]
      - summary["effective_config"]["oft_case"]["mesh"]["dx"]
      - summary["effective_config"]["oft_case"]["discretization"]["fe_order"]
      - summary["diagnostics"] fields (best-effort; may include solver stats)

reporting:
  deliver:
    - "List of created config files"
    - "Commands executed for validation and runs"
    - "Paths to each run directory"
    - "A small comparison table derived from summary.json"
