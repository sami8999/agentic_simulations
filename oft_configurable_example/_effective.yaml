oft_case:
  name: test
  model:
    type: gs_plasma
  outputs:
    output_dir: out
    overwrite: false
    write_eqdsk: true
    write_ifile: false
    write_mug: false
    log_level: info
  mesh:
    boundary:
      type: polygon
      points:
      - - 1
        - 0
      - - 1
        - 1
      - - 2
        - 0
    regions:
    - id: 1
      name: plasma
      type: plasma
      shape:
        type: rectangle
        r0: 1.0
        z0: 0.0
        width: 0.2
        height: 0.2
    meshing:
      dx: 0.1
      require_boundary: true
  discretization:
    fe_order: 2
    full_domain: true
  physics:
    units:
      length: m
      current: A
      pressure: Pa
    targets:
      Ip: 100000
    profiles:
      ffprime:
        x:
        - 0.0
        - 1.0
        y:
        - 0.0
        - 0.0
      pprime:
        x:
        - 0.0
        - 1.0
        y:
        - -1.0
        - -1.0
