oft_case:
  name: demo_gs_plasma
  model:
    type: gs_plasma
  outputs:
    output_dir: outputs
    overwrite: true
    write_eqdsk: true
    eqdsk_filename: equilibrium.geqdsk
    eqdsk_nr: 65
    eqdsk_nz: 65
    run_info: OFT config-driven demo
    write_ifile: false
    write_mug: false
    log_level: info
  mesh:
    boundary:
      type: polygon
      points:
      - - 0.7
        - -0.7
      - - 1.7
        - -0.7
      - - 1.7
        - 0.7
      - - 0.7
        - 0.7
    regions:
    - id: 2
      name: vacuum
      type: vacuum
      shape:
        type: rectangle
        r0: 1.2
        z0: 0.0
        width: 1.0
        height: 1.4
    - id: 1
      name: plasma
      type: plasma
      shape:
        type: ellipse
        r0: 1.2
        z0: 0.0
        a: 0.35
        b: 0.35
    meshing:
      dx: 0.05
      require_boundary: true
  discretization:
    fe_order: 2
    full_domain: true
  physics:
    units:
      length: m
      current: A
      pressure: Pa
    F0: 2.2
    targets:
      Ip: 100000.0
      retain_previous: false
    profiles:
      ffprime:
        x:
        - 0.0
        - 0.5
        - 1.0
        y:
        - 0.0
        - 0.0
        - 0.0
      pprime:
        x:
        - 0.0
        - 0.5
        - 1.0
        y:
        - -1.0
        - -0.5
        - 0.0
